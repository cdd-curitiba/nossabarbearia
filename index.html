<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nossa Barbearia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Work Sans', sans-serif;
    background: #0f0e0c;
    color: #f3efe9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .top-badge {
    background: #1f1c19;
    border: 1px solid #3a342e;
    border-radius: 999px;
    padding: 6px 18px;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a35a;
    margin-bottom: 28px;
    font-weight: 600;
  }

  .logo {
    width: 140px;
    height: auto;
    border-radius: 14px;
    display: block;
    margin: 0 auto 24px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(42px, 10vw, 72px);
    letter-spacing: 3px;
    text-align: center;
    line-height: 1;
    margin-bottom: 8px;
  }

  h1 span { color: #c9a35a; }

  .subtitle {
    text-align: center;
    color: #a99f93;
    font-size: 15px;
    margin-bottom: 40px;
  }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 40px;
  }

  .card {
    background: #1a1815;
    border: 1px solid #2e2a25;
    border-radius: 20px;
    padding: 28px 22px;
    text-decoration: none;
    color: #f3efe9;
    transition: transform 0.18s, border-color 0.18s, background 0.18s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .card.whats { border-color: #1a3d28; }
  .card.whats:hover { background: #162d1e; border-color: #25D366; }

  .card.agenda { border-color: #3a2e1a; }
  .card.agenda:hover { background: #2a2010; border-color: #c9a35a; }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card.whats .card-icon { background: #25D36620; }
  .card.agenda .card-icon { background: #c9a35a20; }

  .card-icon svg { width: 24px; height: 24px; }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    line-height: 1;
  }

  .card.whats .card-title { color: #25D366; }
  .card.agenda .card-title { color: #c9a35a; }

  .card-desc {
    font-size: 13px;
    color: #a99f93;
    line-height: 1.4;
  }

  .info {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    align-items: center;
  }

  .info-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #a99f93;
    justify-content: center;
    text-align: center;
  }

  .info-row svg { flex-shrink: 0; }
  .info-row strong { color: #f3efe9; }
</style>
</head>
<body>

  <div class="top-badge">Barba &bull; Cabelo &bull; Bigode</div>

  <img src="logo.png" alt="Nossa Barbearia" class="logo" />

  <h1>Nossa <span>Barbearia</span></h1>
  <p class="subtitle">Selecione uma opção abaixo</p>

  <div class="cards">
    <a class="card whats" href="https://wa.me/5592992282621" target="_blank">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="#25D366">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
        </svg>
      </div>
      <span class="card-title">WhatsApp</span>
      <span class="card-desc">Fale com a gente agora mesmo</span>
    </a>

    <a class="card agenda" href="agendamento.html">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9a35a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <span class="card-title">Agendar</span>
      <span class="card-desc">Reserve seu horário online</span>
    </a>
  </div>

  <div class="info">
    <div class="info-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a35a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span><strong>Seg a Sáb</strong> — 09h às 18h30</span>
    </div>
    <div class="info-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c9a35a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      <span>Rua Jorge Guimarães de Camargo, 526 — Cruzeiro</span>
    </div>
  </div>

</body>
</html>
