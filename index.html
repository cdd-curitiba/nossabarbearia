<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nossa Barbearia - Agendamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #2b1e16;
    --surface: #3a2a1e;
    --surface-2: #4a3526;
    --gold: #f3a712;
    --gold-dim: #b9810f;
    --text: #faf3e6;
    --text-dim: #c4b2a0;
    --success: #8fc78f;
    --success-bg: #25321f;
    --danger: #e08a76;
    --danger-bg: #3a261f;
    --border: #50392a;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Work Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  header {
    text-align: center;
    padding: 40px 20px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo-img {
    width: 160px;
    height: auto;
    margin: 0 auto 12px;
    position: relative;
    z-index: 1;
    display: block;
    border-radius: var(--radius);
  }

  .tagline {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 0;
    font-weight: 500;
  }

  section { margin-bottom: 28px; }

  .section-label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  @media (min-width: 480px) {
    .days-grid { grid-template-columns: repeat(7, 1fr); }
  }

  .day-btn, .slot-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 12px 4px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }

  .day-btn:hover, .slot-btn:hover:not(:disabled) {
    border-color: var(--gold-dim);
  }

  .day-btn.active {
    background: var(--gold);
    color: #1a1611;
    border-color: var(--gold);
    font-weight: 600;
  }

  .slots-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  @media (min-width: 480px) {
    .slots-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .slot-btn {
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .slot-time { font-size: 16px; font-weight: 600; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .slot-status { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--success); }

  .slot-btn.taken {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
    opacity: 0.5;
  }
  .slot-btn.taken .slot-status { color: var(--text-dim); }

  .slot-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1611;
  }
  .slot-btn.active .slot-status { color: #1a1611; }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 13px 14px;
    font-family: inherit;
    font-size: 15px;
  }

  .field input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .btn-primary {
    width: 100%;
    background: var(--gold);
    color: #1a1611;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-msg {
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }

  .status-msg.success { display: block; background: var(--success-bg); color: var(--success); }
  .status-msg.error { display: block; background: var(--danger-bg); color: var(--danger); }

  .my-bookings .booking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }

  .booking-card .day-name { color: var(--gold); font-weight: 600; }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 40px;
    letter-spacing: 1px;
  }

  .spinner {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="Nossa Barbearia - Barba, Cabelo, Bigode" class="logo-img" />
    <p class="tagline">Agende seu horário</p>
  </header>

  <div id="status-msg" class="status-msg"></div>

  <section>
    <p class="section-label">Dia da semana</p>
    <div class="days-grid" id="days"></div>
  </section>

  <section>
    <p class="section-label">Horário</p>
    <div id="slots-wrap">
      <div class="spinner">Carregando horários...</div>
    </div>
  </section>

  <section>
    <p class="section-label">Seus dados</p>
    <div class="field">
      <label for="client-name">Nome</label>
      <input type="text" id="client-name" placeholder="Seu nome completo" />
    </div>
    <div class="field">
      <label for="client-phone">Telefone (opcional)</label>
      <input type="tel" id="client-phone" placeholder="(00) 00000-0000" />
    </div>
  </section>

  <button class="btn-primary" id="book-btn">Confirmar</button>

  <section class="my-bookings" id="my-bookings-wrap" style="display:none; margin-top: 32px;">
    <p class="section-label">Meus agendamentos</p>
    <div id="my-bookings"></div>
  </section>

  <footer>Nossa Barbearia &middot; Agendamento online</footer>
</div>

<script>
// ============================================================
// CONFIGURAÇÃO: cole aqui a URL do seu Google Apps Script
// (veja o passo a passo enviado para configurar)
// ============================================================
const API_URL = "https://script.google.com/macros/s/AKfycbyc0cJPDqUfnSVzzgoBfAKbvaEYNUBo5wHx4ajIhXbWO9QgmVvitlkt0Or9HcYUYd1iQw/exec";

const DAYS = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];
const SLOTS = ['08:00','09:00','10:00','11:00','13:00','14:00','15:00','16:00','17:00','18:00'];

let selectedDay = DAYS[0];
let selectedSlot = null;
let bookings = {};

const daysEl = document.getElementById('days');
const slotsWrap = document.getElementById('slots-wrap');
const bookBtn = document.getElementById('book-btn');
const statusEl = document.getElementById('status-msg');
const nameInput = document.getElementById('client-name');
const phoneInput = document.getElementById('client-phone');
const myBookingsWrap = document.getElementById('my-bookings-wrap');
const myBookingsEl = document.getElementById('my-bookings');

function showStatus(text, type) {
  statusEl.className = 'status-msg ' + type;
  statusEl.textContent = text;
  statusEl.style.display = 'block';
  setTimeout(() => { statusEl.style.display = 'none'; }, 4000);
}

function renderDays() {
  daysEl.innerHTML = '';
  DAYS.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (day === selectedDay ? ' active' : '');
    btn.textContent = day.slice(0, 3);
    btn.onclick = () => {
      selectedDay = day;
      selectedSlot = null;
      renderDays();
      renderSlots();
    };
    daysEl.appendChild(btn);
  });
}

function renderSlots() {
  const dayBookings = bookings[selectedDay] || {};
  const grid = document.createElement('div');
  grid.className = 'slots-grid';

  SLOTS.forEach(slot => {
    const taken = dayBookings[slot];
    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (taken ? ' taken' : (slot === selectedSlot ? ' active' : ''));

    const time = document.createElement('span');
    time.className = 'slot-time';
    time.textContent = slot;
    btn.appendChild(time);

    const status = document.createElement('span');
    status.className = 'slot-status';
    status.textContent = taken ? 'Ocupado' : 'Livre';
    btn.appendChild(status);

    if (taken) {
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        selectedSlot = slot;
        renderSlots();
      };
    }
    grid.appendChild(btn);
  });

  slotsWrap.innerHTML = '';
  slotsWrap.appendChild(grid);
}

function renderMyBookings() {
  const name = nameInput.value.trim().toLowerCase();
  if (!name) {
    myBookingsWrap.style.display = 'none';
    return;
  }
  const mine = [];
  Object.keys(bookings).forEach(day => {
    Object.keys(bookings[day]).forEach(slot => {
      const b = bookings[day][slot];
      if ((b.name || '').trim().toLowerCase() === name) {
        mine.push({ day, slot });
      }
    });
  });
  if (mine.length === 0) {
    myBookingsWrap.style.display = 'none';
    return;
  }
  myBookingsWrap.style.display = 'block';
  myBookingsEl.innerHTML = '';
  mine.forEach(b => {
    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = '<span><span class="day-name">' + b.day + '</span> às ' + b.slot + '</span>';
    myBookingsEl.appendChild(card);
  });
}

async function loadBookings() {
  try {
    const res = await fetch(API_URL + '?action=list');
    const data = await res.json();
    bookings = {};
    if (data.success && data.bookings) {
      data.bookings.forEach(b => {
        if (!bookings[b.day]) bookings[b.day] = {};
        bookings[b.day][b.slot] = { name: b.name, phone: b.phone };
      });
    }
  } catch (e) {
    showStatus('Não foi possível carregar os horários. Verifique sua conexão.', 'error');
  }
  renderSlots();
  renderMyBookings();
}

bookBtn.onclick = async () => {
  const name = nameInput.value.trim();
  if (!name) {
    showStatus('Digite seu nome antes de confirmar', 'error');
    return;
  }
  if (!selectedSlot) {
    showStatus('Escolha um horário disponível', 'error');
    return;
  }

  bookBtn.disabled = true;
  bookBtn.textContent = 'Enviando...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'book',
        day: selectedDay,
        slot: selectedSlot,
        name: name,
        phone: phoneInput.value.trim()
      })
    });
    const data = await res.json();

    if (data.success) {
      showStatus('Agendado para ' + selectedDay + ' às ' + selectedSlot + '!', 'success');
      selectedSlot = null;
      await loadBookings();
    } else {
      showStatus(data.error || 'Não foi possível agendar', 'error');
      await loadBookings();
    }
  } catch (e) {
    showStatus('Erro ao enviar. Verifique sua conexão e tente novamente.', 'error');
  }

  bookBtn.disabled = false;
  bookBtn.textContent = 'Confirmar';
};

nameInput.oninput = renderMyBookings;

renderDays();
loadBookings();
</script>
</body>
</html>
