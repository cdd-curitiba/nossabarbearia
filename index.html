<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nossa Barbearia - Agendamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161412;
    --surface: #1f1c19;
    --surface-2: #2a2521;
    --gold: #c9a35a;
    --gold-dim: #8a7242;
    --text: #f3efe9;
    --text-dim: #a99f93;
    --success: #6fae6f;
    --success-bg: #1f2a1f;
    --danger: #d9665a;
    --danger-bg: #2a1f1d;
    --border: #3a342e;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Work Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 520px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  header {
    text-align: center;
    padding: 40px 20px 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo-mark {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
    border: 1px solid var(--gold-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 28px; height: 28px; }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 3px;
    margin: 0;
    color: var(--text);
  }

  .tagline {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin: 8px 0 0;
    font-weight: 500;
  }

  section { margin-bottom: 28px; }

  .section-label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  @media (min-width: 480px) {
    .days-grid { grid-template-columns: repeat(7, 1fr); }
  }

  .day-btn, .slot-btn, .service-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 12px 4px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }

  .day-btn:hover, .slot-btn:hover:not(:disabled), .service-btn:hover {
    border-color: var(--gold-dim);
  }

  .day-btn.active, .service-btn.active {
    background: var(--gold);
    color: #1a1611;
    border-color: var(--gold);
    font-weight: 600;
  }

  /* Serviços */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .service-btn {
    padding: 16px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .service-name { font-size: 15px; font-weight: 600; }
  .service-duration { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
  .service-btn.active .service-duration { color: #1a1611; opacity: 0.7; }

  /* Slots */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  @media (min-width: 480px) {
    .slots-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .slot-btn {
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .slot-time { font-size: 16px; font-weight: 600; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .slot-status { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--success); }

  .slot-btn.taken {
    background: var(--surface);
    border-color: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
    opacity: 0.45;
  }
  .slot-btn.taken .slot-status { color: var(--text-dim); }

  .slot-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #1a1611;
  }
  .slot-btn.active .slot-status { color: #1a1611; }

  .field { margin-bottom: 14px; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 13px 14px;
    font-family: inherit;
    font-size: 15px;
  }

  .field input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .btn-primary {
    width: 100%;
    background: var(--gold);
    color: #1a1611;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-msg {
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
    text-align: center;
  }

  .status-msg.success { display: block; background: var(--success-bg); color: var(--success); }
  .status-msg.error { display: block; background: var(--danger-bg); color: var(--danger); }

  .my-bookings .booking-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    font-size: 14px;
  }

  .booking-card .day-name { color: var(--gold); font-weight: 600; }

  .spinner {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px;
  }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin-top: 40px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <img src="logo.png" alt="Nossa Barbearia" style="width:160px; height:auto; border-radius:12px; display:block; margin:0 auto 12px;" />
    <p class="tagline">Agende seu horário</p>
  </header>

  <div id="status-msg" class="status-msg"></div>

  <section>
    <p class="section-label">Serviço</p>
    <div class="services-grid" id="services">
      <button class="service-btn active" data-service="corte-barba" data-duration="60" onclick="selectService(this)">
        <span class="service-name">Corte + Barba</span>
        <span class="service-duration">1 hora</span>
      </button>
      <button class="service-btn" data-service="corte" data-duration="30" onclick="selectService(this)">
        <span class="service-name">Corte</span>
        <span class="service-duration">30 minutos</span>
      </button>
    </div>
  </section>

  <section>
    <p class="section-label">Dia da semana</p>
    <div class="days-grid" id="days"></div>
  </section>

  <section>
    <p class="section-label">Horário</p>
    <div id="slots-wrap">
      <div class="spinner">Carregando horários...</div>
    </div>
  </section>

  <section>
    <p class="section-label">Seus dados</p>
    <div class="field">
      <label for="client-name">Nome</label>
      <input type="text" id="client-name" placeholder="Seu nome completo" />
    </div>
    <div class="field">
      <label for="client-phone">Telefone (opcional)</label>
      <input type="tel" id="client-phone" placeholder="(00) 00000-0000" />
    </div>
  </section>

  <button class="btn-primary" id="book-btn">Confirmar</button>

  <section class="my-bookings" id="my-bookings-wrap" style="display:none; margin-top: 32px;">
    <p class="section-label">Meus agendamentos</p>
    <div id="my-bookings"></div>
  </section>

  <footer>Nossa Barbearia &middot; Agendamento online</footer>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyBy5G87xNNvBUlekyv0YSHc-KAgWfSoQd7qYfmNdT8513w5w6-X4ytv69P_uhyHpWF2g/exec";

const DAYS = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

// Gera horários de 09:00 às 18:30 em intervalos de 30 min
// O último slot disponível depende da duração do serviço:
// - Corte (30min): até 18:30 (termina 19:00)
// - Corte + Barba (60min): até 18:00 (termina 19:00)
const ALL_SLOTS = [];
for (let h = 9; h < 19; h++) {
  ALL_SLOTS.push(h.toString().padStart(2,'0') + ':00');
  if (h < 19) ALL_SLOTS.push(h.toString().padStart(2,'0') + ':30');
}

let selectedDay = DAYS[0];
let selectedSlot = null;
let selectedDuration = 60; // minutos
let bookings = {}; // { "Segunda": { "09:00": {name, phone, duration}, ... } }

const daysEl = document.getElementById('days');
const slotsWrap = document.getElementById('slots-wrap');
const bookBtn = document.getElementById('book-btn');
const statusEl = document.getElementById('status-msg');
const nameInput = document.getElementById('client-name');
const phoneInput = document.getElementById('client-phone');
const myBookingsWrap = document.getElementById('my-bookings-wrap');
const myBookingsEl = document.getElementById('my-bookings');

function showStatus(text, type) {
  statusEl.className = 'status-msg ' + type;
  statusEl.textContent = text;
  setTimeout(() => { statusEl.style.display = 'none'; }, 4000);
}

function selectService(btn) {
  document.querySelectorAll('.service-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDuration = parseInt(btn.dataset.duration);
  selectedSlot = null;
  renderSlots();
}

// Retorna todos os slots bloqueados dado os agendamentos do dia
function getBlockedSlots(day) {
  const dayBookings = bookings[day] || {};
  const blocked = new Set();
  Object.entries(dayBookings).forEach(([slot, info]) => {
    blocked.add(slot);
    // bloqueia os slots seguintes conforme duração
    const dur = parseInt(info.duration) || 60;
    const steps = dur / 30;
    const idx = ALL_SLOTS.indexOf(slot);
    for (let i = 1; i < steps; i++) {
      if (idx + i < ALL_SLOTS.length) blocked.add(ALL_SLOTS[idx + i]);
    }
  });
  return blocked;
}

// Verifica se um slot pode ser selecionado
function slotAvailable(day, slot) {
  const blocked = getBlockedSlots(day);
  if (blocked.has(slot)) return false;

  // Bloqueia horários que já passaram no dia atual
  const now = new Date();
  const diasSemana = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const hoje = diasSemana[now.getDay()];
  if (day === hoje) {
    const [h, m] = slot.split(':').map(Number);
    const slotMinutes = h * 60 + m;
    const nowMinutes = now.getHours() * 60 + now.getMinutes();
    if (slotMinutes <= nowMinutes) return false;
  }

  return true;
}

function renderDays() {
  daysEl.innerHTML = '';
  DAYS.forEach(day => {
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (day === selectedDay ? ' active' : '');
    btn.textContent = day.slice(0, 3);
    btn.onclick = () => {
      selectedDay = day;
      selectedSlot = null;
      renderDays();
      renderSlots();
    };
    daysEl.appendChild(btn);
  });
}

function renderSlots() {
  const grid = document.createElement('div');
  grid.className = 'slots-grid';

  ALL_SLOTS.forEach(slot => {
    const available = slotAvailable(selectedDay, slot);
    const isSelected = slot === selectedSlot;

    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (!available ? ' taken' : (isSelected ? ' active' : ''));

    const time = document.createElement('span');
    time.className = 'slot-time';
    time.textContent = slot;
    btn.appendChild(time);

    const status = document.createElement('span');
    status.className = 'slot-status';
    status.textContent = !available ? 'Reservado' : 'Livre';
    btn.appendChild(status);

    if (!available) {
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        selectedSlot = slot;
        renderSlots();
      };
    }
    grid.appendChild(btn);
  });

  slotsWrap.innerHTML = '';
  slotsWrap.appendChild(grid);
}

function renderMyBookings() {
  const name = nameInput.value.trim().toLowerCase();
  if (!name) { myBookingsWrap.style.display = 'none'; return; }

  const mine = [];
  Object.keys(bookings).forEach(day => {
    Object.keys(bookings[day]).forEach(slot => {
      const b = bookings[day][slot];
      if ((b.name || '').trim().toLowerCase() === name) {
        mine.push({ day, slot, service: b.service });
      }
    });
  });

  if (mine.length === 0) { myBookingsWrap.style.display = 'none'; return; }
  myBookingsWrap.style.display = 'block';
  myBookingsEl.innerHTML = '';
  mine.forEach(b => {
    const card = document.createElement('div');
    card.className = 'booking-card';
    card.innerHTML = '<span class="day-name">' + b.day + '</span> às ' + b.slot +
      (b.service ? ' &mdash; ' + b.service : '');
    myBookingsEl.appendChild(card);
  });
}

async function loadBookings() {
  try {
    const res = await fetch(API_URL + '?action=list');
    const data = await res.json();
    bookings = {};
    if (data.success && data.bookings) {
      data.bookings.forEach(b => {
        if (!bookings[b.day]) bookings[b.day] = {};
        // Normaliza o slot — pode vir como "09:00" ou como número do Sheets
        let slot = String(b.slot).trim();
        if (!slot.includes(':')) {
          // Converte número fracionário do Sheets para HH:MM
          const totalMinutes = Math.round(parseFloat(slot) * 24 * 60);
          const h = Math.floor(totalMinutes / 60).toString().padStart(2, '0');
          const m = (totalMinutes % 60).toString().padStart(2, '0');
          slot = h + ':' + m;
        }
        const dur = parseInt(b.duration) || 60;
        bookings[b.day][slot] = { name: b.name, phone: b.phone, duration: dur, service: b.service };
      });
    }
  } catch (e) {
    showStatus('Não foi possível carregar os horários.', 'error');
  }
  renderSlots();
  renderMyBookings();
}

bookBtn.onclick = async () => {
  const name = nameInput.value.trim();
  if (!name) { showStatus('Digite seu nome antes de confirmar', 'error'); return; }
  if (!selectedSlot) { showStatus('Escolha um horário disponível', 'error'); return; }

  const activeServiceBtn = document.querySelector('.service-btn.active');
  const serviceName = activeServiceBtn ? activeServiceBtn.querySelector('.service-name').textContent : '';

  bookBtn.disabled = true;
  bookBtn.textContent = 'Enviando...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'book',
        day: selectedDay,
        slot: selectedSlot,
        name: name,
        phone: phoneInput.value.trim(),
        duration: selectedDuration,
        service: serviceName
      })
    });
    const data = await res.json();
    if (data.success) {
      showStatus('Agendado! ' + selectedDay + ' às ' + selectedSlot + ' — ' + serviceName, 'success');
      selectedSlot = null;
      await loadBookings();
    } else {
      showStatus(data.error || 'Não foi possível agendar', 'error');
      await loadBookings();
    }
  } catch (e) {
    showStatus('Erro ao enviar. Verifique sua conexão.', 'error');
  }

  bookBtn.disabled = false;
  bookBtn.textContent = 'Confirmar';
};

nameInput.oninput = renderMyBookings;

renderDays();
loadBookings();
</script>
</body>
</html>
